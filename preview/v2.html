<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Thrun — Papers · ReachOut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800;9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#0D2B1E; --g800:#1B4D3E; --g700:#1F5C49; --g600:#2D7A5F; --g100:#D1FAE5; --g50:#ECFDF5;
  --n900:#111827; --n800:#1F2937; --n700:#374151; --n600:#4B5563; --n500:#6B7280; --n400:#9CA3AF; --n300:#D1D5DB; --n200:#E5E7EB; --n100:#F3F4F6; --n50:#F9FAFB;
  --white:#FFFFFF; --bg:#F6F7F9;
  --font-d:'Fraunces',Georgia,serif; --font-b:'DM Sans',system-ui,sans-serif;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 14px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh-lg:0 10px 32px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  font-family:var(--font-b);
  background:var(--bg);
  color:var(--n900);
  line-height:1.5;
  padding:32px 20px 80px;
}
.wrap{max-width:860px;margin:0 auto}

/* Back link */
.back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--n500);
  text-decoration:none;margin-bottom:24px;transition:color .15s ease;
}
.back:hover{color:var(--g800)}
.back svg{width:14px;height:14px}

/* Header */
.header{margin-bottom:32px}
.prof-name{
  font-family:var(--font-d);font-weight:800;font-size:30px;line-height:1.15;
  color:var(--n900);letter-spacing:-.01em;
}
.prof-inst{font-size:15px;color:var(--n500);margin-top:4px;font-weight:400}
.prof-areas{font-size:13px;color:var(--n400);margin-top:10px;font-weight:500}

/* Publications header + sort toggle */
.pub-head{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:18px;
}
.pub-title{
  font-family:var(--font-d);font-weight:700;font-size:19px;color:var(--n900);
}
.toggle{
  display:inline-flex;background:var(--n100);border:1px solid var(--n200);
  border-radius:var(--r-md);padding:3px;gap:2px;
}
.toggle button{
  font-family:var(--font-b);font-size:13px;font-weight:600;
  border:none;background:transparent;color:var(--n600);
  padding:6px 14px;border-radius:7px;cursor:pointer;transition:all .15s ease;
}
.toggle button:hover{color:var(--n900)}
.toggle button.active{background:var(--g800);color:var(--white);box-shadow:var(--sh-sm)}

/* Grid */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:16px;
}
@media (max-width:640px){.grid{grid-template-columns:1fr}}

/* Card */
.card{
  background:var(--white);border:1px solid var(--n200);border-radius:var(--r-lg);
  box-shadow:var(--sh-sm);padding:18px 18px 14px;cursor:pointer;
  display:flex;flex-direction:column;
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:var(--n300)}
.card:focus-visible{outline:2px solid var(--g600);outline-offset:2px}

.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0}
.badge{
  font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;line-height:1.3;white-space:nowrap;
}
.badge--recent{background:var(--g800);color:var(--white)}
.badge--cited{background:var(--g100);color:var(--g800)}
.badge--oa{background:var(--g50);color:var(--g700);border:1px solid var(--g100)}
.badge--preprint{background:#FEF3C7;color:#92400E}

.card-title{
  font-family:var(--font-d);font-weight:700;font-size:16px;line-height:1.3;
  color:var(--n900);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;text-overflow:ellipsis;
  margin-bottom:8px;
}
.card-meta{font-size:13px;color:var(--n500);margin-bottom:2px}
.card-cites{font-size:13px;color:var(--n600);font-weight:500;margin-bottom:12px}
.card-cites b{color:var(--n800);font-weight:700}

.card-actions{
  margin-top:auto;display:flex;gap:8px;padding-top:10px;
  border-top:1px solid var(--n100);
}
.chip{
  font-size:12px;font-weight:600;color:var(--g800);
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:var(--r-sm);background:var(--g50);
  border:1px solid var(--g100);cursor:pointer;transition:all .15s ease;
  text-decoration:none;
}
.chip:hover{background:var(--g100)}
.chip svg{width:13px;height:13px}

/* View all */
.viewall{
  text-align:center;margin-top:28px;
}
.viewall a{
  font-size:14px;font-weight:600;color:var(--g800);text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.viewall a:hover{color:var(--g600);text-decoration:underline}

/* Modal */
.backdrop{
  position:fixed;inset:0;background:rgba(13,43,30,.45);
  backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.backdrop.open{opacity:1;pointer-events:auto}
.modal{
  background:var(--white);border-radius:var(--r-xl);box-shadow:var(--sh-lg);
  max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
  padding:28px 28px 24px;position:relative;
  transform:translateY(8px) scale(.98);transition:transform .18s ease;
}
.backdrop.open .modal{transform:translateY(0) scale(1)}
.modal-close{
  position:absolute;top:16px;right:16px;width:34px;height:34px;
  border:none;background:var(--n100);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--n600);
  transition:all .15s ease;
}
.modal-close:hover{background:var(--n200);color:var(--n900)}
.modal-close svg{width:16px;height:16px}

.modal .badges{margin-bottom:14px;margin-top:4px}
.modal-title{
  font-family:var(--font-d);font-weight:700;font-size:22px;line-height:1.28;
  color:var(--n900);padding-right:30px;margin-bottom:12px;
}
.modal-meta{font-size:14px;color:var(--n600);margin-bottom:4px}
.modal-cites{font-size:14px;color:var(--n700);font-weight:500;margin-bottom:20px}
.modal-cites b{color:var(--n900);font-weight:700}

.modal-links{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.mlink{
  font-size:13px;font-weight:600;color:var(--n700);
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;border-radius:var(--r-md);background:var(--n50);
  border:1px solid var(--n200);text-decoration:none;transition:all .15s ease;
}
.mlink:hover{background:var(--n100);border-color:var(--n300);color:var(--n900)}
.mlink svg{width:14px;height:14px}

.copy-btn{
  width:100%;font-family:var(--font-b);font-size:14px;font-weight:600;
  color:var(--white);background:var(--g800);border:none;border-radius:var(--r-md);
  padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s ease;
}
.copy-btn:hover{background:var(--g700)}
.copy-btn.copied{background:var(--g600)}
.copy-btn svg{width:16px;height:16px}
.cite-preview{
  font-size:12.5px;color:var(--n500);line-height:1.5;margin-top:12px;
  background:var(--n50);border:1px solid var(--n200);border-radius:var(--r-md);
  padding:11px 13px;
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to results
  </a>

  <div class="header">
    <h1 class="prof-name" id="profName"></h1>
    <div class="prof-inst" id="profInst"></div>
    <div class="prof-areas" id="profAreas"></div>
  </div>

  <div class="pub-head">
    <div class="pub-title">Publications</div>
    <div class="toggle" role="group" aria-label="Sort publications">
      <button id="sortRecent" class="active" aria-pressed="true">Recent</button>
      <button id="sortCited" aria-pressed="false">Most cited</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="viewall" id="viewall"></div>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="badges" id="modalBadges"></div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-cites" id="modalCites"></div>
    <div class="modal-links" id="modalLinks"></div>
    <button class="copy-btn" id="copyBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyLabel">Copy citation</span>
    </button>
    <div class="cite-preview" id="citePreview"></div>
  </div>
</div>

<script>
const PROF = {
  name:"Sebastian Thrun", institution:"Stanford University", worksCount:446,
  areas:["Robotics","Machine Learning","Computer Vision","Path Planning","Medical AI"],
  links:{scholar:"https://scholar.google.com/scholar?q=%22Sebastian%20Thrun%22", openalex:"https://openalex.org/works?filter=author.id:A5066710774"},
  papers:[
    {title:"Foundation models for generalist medical artificial intelligence", year:2024, venue:"Nature", type:"article", citedByCount:412, isMostRecent:true, isOpenAccess:true, oaPdfUrl:"https://www.nature.com/articles/s41586-023-06555-x.pdf", doi:"10.1038/s41586-023-06555-x"},
    {title:"Large language models encode clinical knowledge", year:2023, venue:"Nature Medicine", type:"article", citedByCount:980, isOpenAccess:false, doi:"10.1038/s41591-023-02448-8"},
    {title:"Self-supervised representation learning for robotic perception", year:2023, venue:"arXiv", type:"preprint", isPreprint:true, citedByCount:34, isOpenAccess:true, oaPdfUrl:"https://arxiv.org/pdf/2303.00001", doi:null},
    {title:"Dermatologist-level classification of skin cancer with deep neural networks", year:2017, venue:"Nature", type:"article", citedByCount:13765, isMostCited:true, isOpenAccess:true, oaPdfUrl:null, doi:"10.1038/nature21056"},
    {title:"A guide to deep learning in healthcare", year:2018, venue:"Nature Medicine", type:"review", citedByCount:4664, isOpenAccess:false, doi:"10.1038/s41591-018-0316-z"},
    {title:"Probabilistic robotics", year:2002, venue:"Communications of the ACM", type:"article", citedByCount:8013, isOpenAccess:false, doi:"10.1145/504729.504754"},
    {title:"Stanley: The robot that won the DARPA Grand Challenge", year:2006, venue:"Journal of Field Robotics", type:"article", citedByCount:2111, isOpenAccess:true, oaPdfUrl:"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/rob.20147", doi:"10.1002/rob.20147"},
    {title:"The dynamic window approach to collision avoidance", year:1997, venue:"IEEE Robotics & Automation Magazine", type:"article", citedByCount:3636, isOpenAccess:false, doi:"10.1109/100.580977"}
  ]
};

// ---- helpers ----
function esc(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s){ return esc(s); }
function doiUrl(doi){ return 'https://doi.org/' + doi; }

const ICONS = {
  pdf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
  cite:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
};

function badgesHtml(p){
  let h = '';
  if(p.isMostRecent) h += '<span class="badge badge--recent">Most recent</span>';
  if(p.isMostCited)  h += '<span class="badge badge--cited">Most cited</span>';
  if(p.isPreprint)   h += '<span class="badge badge--preprint">Preprint</span>';
  if(p.isOpenAccess) h += '<span class="badge badge--oa">Open access</span>';
  return h;
}

// ---- grid ----
const grid = document.getElementById('grid');
let currentSort = 'recent';

function sortedPapers(){
  const arr = PROF.papers.slice();
  if(currentSort === 'recent'){
    arr.sort((a,b)=> (b.year - a.year) || ((b.citedByCount||0) - (a.citedByCount||0)));
  } else {
    arr.sort((a,b)=> ((b.citedByCount||0) - (a.citedByCount||0)));
  }
  return arr;
}

function renderGrid(){
  const papers = sortedPapers();
  grid.innerHTML = papers.map((p,i)=>{
    const cites = (p.citedByCount||0).toLocaleString();
    let actions = '';
    if(p.oaPdfUrl){
      actions += `<a class="chip" href="${escAttr(p.oaPdfUrl)}" target="_blank" rel="noopener" data-stop>${ICONS.pdf}PDF</a>`;
    }
    actions += `<span class="chip" data-cite="${i}">${ICONS.cite}Cite</span>`;
    return `
      <div class="card" tabindex="0" role="button" data-idx="${i}" aria-label="${escAttr(p.title)}">
        <div class="badges">${badgesHtml(p)}</div>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-meta">${esc(p.venue)} · ${p.year}</div>
        <div class="card-cites"><b>${cites}</b> citation${(p.citedByCount===1)?'':'s'}</div>
        <div class="card-actions">${actions}</div>
      </div>`;
  }).join('');

  // wire up cards
  grid.querySelectorAll('.card').forEach(el=>{
    const idx = +el.dataset.idx;
    el.addEventListener('click', ()=> openModal(papers[idx]));
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); openModal(papers[idx]); }
    });
  });
  // PDF chips shouldn't open modal
  grid.querySelectorAll('[data-stop]').forEach(a=>{
    a.addEventListener('click', e=> e.stopPropagation());
  });
  // Cite chip -> open modal directly
  grid.querySelectorAll('[data-cite]').forEach(c=>{
    c.addEventListener('click', e=>{
      e.stopPropagation();
      openModal(papers[+c.dataset.cite]);
    });
  });
}

// ---- header / static render ----
function renderHeader(){
  document.getElementById('profName').textContent = PROF.name;
  document.getElementById('profInst').textContent = PROF.institution;
  document.getElementById('profAreas').textContent = PROF.areas.join(' · ');
  document.getElementById('viewall').innerHTML =
    `<a href="${escAttr(PROF.links.scholar)}" target="_blank" rel="noopener">View all ${PROF.worksCount.toLocaleString()} on Google Scholar ${ICONS.arrow}</a>`;
}

// ---- modal ----
const backdrop = document.getElementById('backdrop');
const modal = document.getElementById('modal');
let lastFocused = null;

function citationText(p){
  let c = `${PROF.name}. "${p.title}." ${p.venue}, ${p.year}.`;
  if(p.doi) c += ` ${doiUrl(p.doi)}`;
  return c;
}

function openModal(p){
  lastFocused = document.activeElement;
  document.getElementById('modalBadges').innerHTML = badgesHtml(p) || '';
  document.getElementById('modalTitle').textContent = p.title;
  const typeLabel = p.type ? p.type.charAt(0).toUpperCase()+p.type.slice(1) : '';
  document.getElementById('modalMeta').textContent =
    `${p.venue} · ${p.year}${typeLabel ? ' · ' + typeLabel : ''}`;
  document.getElementById('modalCites').innerHTML =
    `<b>${(p.citedByCount||0).toLocaleString()}</b> citation${(p.citedByCount===1)?'':'s'}`;

  // links
  let links = '';
  if(p.oaPdfUrl) links += `<a class="mlink" href="${escAttr(p.oaPdfUrl)}" target="_blank" rel="noopener">${ICONS.pdf}Read PDF</a>`;
  if(p.doi)      links += `<a class="mlink" href="${escAttr(doiUrl(p.doi))}" target="_blank" rel="noopener">${ICONS.link}DOI</a>`;
  const scholarQ = `https://scholar.google.com/scholar?q=${encodeURIComponent('"'+p.title+'"')}`;
  links += `<a class="mlink" href="${escAttr(scholarQ)}" target="_blank" rel="noopener">${ICONS.link}Google Scholar</a>`;
  links += `<a class="mlink" href="${escAttr(PROF.links.openalex)}" target="_blank" rel="noopener">${ICONS.link}OpenAlex</a>`;
  document.getElementById('modalLinks').innerHTML = links;

  // citation
  const cite = citationText(p);
  document.getElementById('citePreview').textContent = cite;
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.classList.remove('copied');
  document.getElementById('copyLabel').textContent = 'Copy citation';
  copyBtn.onclick = ()=> doCopy(cite);

  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modalClose').focus();
}

function closeModal(){
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  if(lastFocused) lastFocused.focus();
}

function doCopy(text){
  const btn = document.getElementById('copyBtn');
  const label = document.getElementById('copyLabel');
  const done = ()=>{
    btn.classList.add('copied');
    label.textContent = 'Copied!';
    setTimeout(()=>{ btn.classList.remove('copied'); label.textContent='Copy citation'; }, 1800);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  document.body.removeChild(ta);
}

document.getElementById('modalClose').addEventListener('click', closeModal);
backdrop.addEventListener('click', e=>{ if(e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && backdrop.classList.contains('open')) closeModal(); });

// ---- sort toggle ----
const btnRecent = document.getElementById('sortRecent');
const btnCited = document.getElementById('sortCited');
function setSort(mode){
  currentSort = mode;
  const recent = mode==='recent';
  btnRecent.classList.toggle('active', recent);
  btnCited.classList.toggle('active', !recent);
  btnRecent.setAttribute('aria-pressed', recent);
  btnCited.setAttribute('aria-pressed', !recent);
  renderGrid();
}
btnRecent.addEventListener('click', ()=>setSort('recent'));
btnCited.addEventListener('click', ()=>setSort('cited'));

// ---- init ----
renderHeader();
renderGrid();
</script>
</body>
</html>
