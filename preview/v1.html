<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Thrun — Publications · ReachOut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800;9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --g900:#0D2B1E; --g800:#1B4D3E; --g700:#1F5C49; --g600:#2D7A5F; --g100:#D1FAE5; --g50:#ECFDF5;
    --n900:#111827; --n800:#1F2937; --n700:#374151; --n600:#4B5563; --n500:#6B7280; --n400:#9CA3AF;
    --n300:#D1D5DB; --n200:#E5E7EB; --n100:#F3F4F6; --n50:#F9FAFB; --white:#FFFFFF; --bg:#F6F7F9;
    --font-d:'Fraunces',Georgia,serif; --font-b:'DM Sans',system-ui,sans-serif;
    --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px;
    --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
    --sh-md:0 4px 14px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
    --sh-lg:0 10px 32px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.05);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:var(--font-b);
    background:var(--bg);
    color:var(--n800);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:32px 24px 80px;
  }

  /* ---- back link ---- */
  .back{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    font-weight:500;
    color:var(--n500);
    text-decoration:none;
    margin-bottom:28px;
    transition:color .15s ease;
  }
  .back:hover{color:var(--g800);}
  .back svg{width:14px;height:14px;}

  /* ---- header ---- */
  header{margin-bottom:36px;}
  .prof-name{
    font-family:var(--font-d);
    font-weight:800;
    font-size:30px;
    line-height:1.15;
    color:var(--n900);
    letter-spacing:-.01em;
  }
  .prof-inst{
    font-size:15px;
    color:var(--n500);
    margin-top:6px;
    font-weight:400;
  }
  .prof-areas{
    font-size:13px;
    color:var(--n500);
    margin-top:12px;
    font-weight:400;
  }
  .prof-areas .dot{color:var(--n300);margin:0 7px;}

  /* ---- publications header row ---- */
  .pubs-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
    gap:16px;
    flex-wrap:wrap;
  }
  .pubs-title{
    font-family:var(--font-d);
    font-weight:700;
    font-size:19px;
    color:var(--n900);
  }
  .pubs-count{
    font-weight:400;
    color:var(--n400);
    font-size:15px;
    font-family:var(--font-b);
    margin-left:8px;
  }

  /* ---- segmented sort toggle ---- */
  .sort{
    display:inline-flex;
    background:var(--n100);
    border:1px solid var(--n200);
    border-radius:var(--r-md);
    padding:3px;
    gap:2px;
  }
  .sort button{
    font-family:var(--font-b);
    font-size:13px;
    font-weight:600;
    color:var(--n600);
    background:transparent;
    border:none;
    padding:6px 14px;
    border-radius:7px;
    cursor:pointer;
    transition:background .18s ease,color .18s ease,box-shadow .18s ease;
  }
  .sort button:hover:not(.active){color:var(--n800);}
  .sort button.active{
    background:var(--g800);
    color:var(--white);
    box-shadow:var(--sh-sm);
  }
  .sort button:focus-visible{outline:2px solid var(--g600);outline-offset:2px;}

  /* ---- list ---- */
  .pub-list{
    list-style:none;
    margin-top:8px;
    border-top:1px solid var(--n200);
  }
  .pub-row{
    display:flex;
    align-items:flex-start;
    gap:20px;
    padding:18px 8px;
    border-bottom:1px solid var(--n200);
    cursor:pointer;
    transition:background .14s ease;
    border-radius:var(--r-sm);
    margin:0 -8px;
  }
  .pub-row:hover{background:var(--white);}
  .pub-row:focus-visible{outline:2px solid var(--g600);outline-offset:-2px;}
  .pub-main{flex:1 1 auto;min-width:0;}
  .pub-title{
    font-family:var(--font-d);
    font-weight:600;
    font-size:16.5px;
    line-height:1.3;
    color:var(--n900);
    letter-spacing:-.005em;
  }
  .pub-meta{
    font-size:13px;
    color:var(--n500);
    margin-top:5px;
  }
  .pub-meta .dot{color:var(--n300);margin:0 6px;}
  .badges{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:9px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    font-size:11px;
    font-weight:600;
    letter-spacing:.01em;
    padding:2.5px 9px;
    border-radius:999px;
    line-height:1.4;
  }
  .badge-recent{background:var(--g50);color:var(--g700);border:1px solid var(--g100);}
  .badge-cited{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
  .badge-preprint{background:var(--n100);color:var(--n600);border:1px solid var(--n200);}
  .badge-oa{background:#EFF6FF;color:#1D4ED8;border:1px solid #DBEAFE;}

  .pub-cites{
    flex:0 0 auto;
    text-align:right;
    padding-top:2px;
    min-width:72px;
  }
  .pub-cites .num{
    font-size:16px;
    font-weight:600;
    color:var(--n800);
    font-variant-numeric:tabular-nums;
  }
  .pub-cites .lbl{
    display:block;
    font-size:11px;
    color:var(--n400);
    font-weight:500;
    margin-top:1px;
  }

  /* ---- footer ---- */
  .pubs-foot{
    margin-top:24px;
    font-size:14px;
    color:var(--n500);
    text-align:center;
  }
  .pubs-foot a{
    color:var(--g800);
    font-weight:600;
    text-decoration:none;
  }
  .pubs-foot a:hover{text-decoration:underline;}
  .pubs-foot .dot{color:var(--n300);margin:0 8px;}

  /* ---- modal ---- */
  .backdrop{
    position:fixed;
    inset:0;
    background:rgba(13,43,30,.42);
    backdrop-filter:blur(2px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
    z-index:50;
  }
  .backdrop.open{opacity:1;pointer-events:auto;}
  .modal{
    background:var(--white);
    border-radius:var(--r-xl);
    box-shadow:var(--sh-lg);
    max-width:520px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:28px;
    position:relative;
    transform:translateY(8px) scale(.98);
    transition:transform .22s cubic-bezier(.16,1,.3,1);
  }
  .backdrop.open .modal{transform:translateY(0) scale(1);}
  .modal-close{
    position:absolute;
    top:16px;
    right:16px;
    width:34px;
    height:34px;
    border:none;
    background:var(--n100);
    border-radius:50%;
    color:var(--n600);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease,color .15s ease;
  }
  .modal-close:hover{background:var(--n200);color:var(--n900);}
  .modal-close:focus-visible{outline:2px solid var(--g600);outline-offset:2px;}
  .modal-close svg{width:16px;height:16px;}

  .m-title{
    font-family:var(--font-d);
    font-weight:700;
    font-size:21px;
    line-height:1.28;
    color:var(--n900);
    padding-right:36px;
    letter-spacing:-.01em;
  }
  .m-meta{
    font-size:13.5px;
    color:var(--n500);
    margin-top:10px;
  }
  .m-meta .dot{color:var(--n300);margin:0 6px;}
  .m-cites{
    font-size:14px;
    color:var(--n700);
    margin-top:8px;
    font-weight:500;
  }
  .m-cites b{font-weight:700;color:var(--n900);}
  .modal .badges{margin-top:16px;}

  .m-actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:22px;
    padding-top:22px;
    border-top:1px solid var(--n200);
  }
  .m-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    color:var(--g800);
    background:var(--g50);
    border:1px solid var(--g100);
    padding:8px 13px;
    border-radius:var(--r-md);
    text-decoration:none;
    transition:background .15s ease,border-color .15s ease;
  }
  .m-link:hover{background:var(--g100);border-color:var(--g600);}
  .m-link:focus-visible{outline:2px solid var(--g600);outline-offset:2px;}

  .m-copy-wrap{margin-top:18px;}
  .m-copy{
    width:100%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:var(--font-b);
    font-size:14.5px;
    font-weight:600;
    color:var(--white);
    background:var(--g800);
    border:none;
    padding:13px 16px;
    border-radius:var(--r-md);
    cursor:pointer;
    transition:background .18s ease,transform .08s ease;
  }
  .m-copy:hover{background:var(--g700);}
  .m-copy:active{transform:translateY(1px);}
  .m-copy:focus-visible{outline:2px solid var(--g600);outline-offset:2px;}
  .m-copy.copied{background:var(--g600);}
  .m-copy svg{width:16px;height:16px;}
  .m-cite-preview{
    font-size:12px;
    color:var(--n400);
    margin-top:10px;
    line-height:1.5;
    font-style:italic;
  }

  @media (max-width:520px){
    .pub-row{gap:12px;}
    .pub-cites{min-width:56px;}
    .modal{padding:22px;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="#" aria-label="Back to discovery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </a>

    <header>
      <h1 class="prof-name" id="profName"></h1>
      <div class="prof-inst" id="profInst"></div>
      <div class="prof-areas" id="profAreas"></div>
    </header>

    <section aria-labelledby="pubsTitle">
      <div class="pubs-head">
        <h2 class="pubs-title" id="pubsTitle">Publications<span class="pubs-count" id="pubsCount"></span></h2>
        <div class="sort" role="group" aria-label="Sort publications">
          <button id="sortRecent" class="active" aria-pressed="true">Recent</button>
          <button id="sortCited" aria-pressed="false">Most cited</button>
        </div>
      </div>
      <ul class="pub-list" id="pubList"></ul>
      <p class="pubs-foot" id="pubsFoot"></p>
    </section>
  </div>

  <!-- Reference helper modal -->
  <div class="backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="mTitle" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <h3 class="m-title" id="mTitle"></h3>
      <div class="m-meta" id="mMeta"></div>
      <div class="m-cites" id="mCites"></div>
      <div class="badges" id="mBadges"></div>
      <div class="m-actions" id="mActions"></div>
      <div class="m-copy-wrap">
        <button class="m-copy" id="mCopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="mCopyLabel">Copy citation</span>
        </button>
        <p class="m-cite-preview" id="mCitePreview"></p>
      </div>
    </div>
  </div>

<script>
  const PROF = {
    name:"Sebastian Thrun", institution:"Stanford University", worksCount:446,
    areas:["Robotics","Machine Learning","Computer Vision","Path Planning","Medical AI"],
    links:{scholar:"https://scholar.google.com/scholar?q=%22Sebastian%20Thrun%22", openalex:"https://openalex.org/works?filter=author.id:A5066710774"},
    papers:[
      {title:"Foundation models for generalist medical artificial intelligence", year:2024, venue:"Nature", type:"article", citedByCount:412, isMostRecent:true, isOpenAccess:true, oaPdfUrl:"https://www.nature.com/articles/s41586-023-06555-x.pdf", doi:"10.1038/s41586-023-06555-x"},
      {title:"Large language models encode clinical knowledge", year:2023, venue:"Nature Medicine", type:"article", citedByCount:980, isOpenAccess:false, doi:"10.1038/s41591-023-02448-8"},
      {title:"Self-supervised representation learning for robotic perception", year:2023, venue:"arXiv", type:"preprint", isPreprint:true, citedByCount:34, isOpenAccess:true, oaPdfUrl:"https://arxiv.org/pdf/2303.00001", doi:null},
      {title:"Dermatologist-level classification of skin cancer with deep neural networks", year:2017, venue:"Nature", type:"article", citedByCount:13765, isMostCited:true, isOpenAccess:true, oaPdfUrl:null, doi:"10.1038/nature21056"},
      {title:"A guide to deep learning in healthcare", year:2018, venue:"Nature Medicine", type:"review", citedByCount:4664, isOpenAccess:false, doi:"10.1038/s41591-018-0316-z"},
      {title:"Probabilistic robotics", year:2002, venue:"Communications of the ACM", type:"article", citedByCount:8013, isOpenAccess:false, doi:"10.1145/504729.504754"},
      {title:"Stanley: The robot that won the DARPA Grand Challenge", year:2006, venue:"Journal of Field Robotics", type:"article", citedByCount:2111, isOpenAccess:true, oaPdfUrl:"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/rob.20147", doi:"10.1002/rob.20147"},
      {title:"The dynamic window approach to collision avoidance", year:1997, venue:"IEEE Robotics & Automation Magazine", type:"article", citedByCount:3636, isOpenAccess:false, doi:"10.1109/100.580977"}
    ]
  };

  // ---- helpers ----
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
  const fmt = (n) => Number(n).toLocaleString("en-US");

  let sortMode = "recent"; // "recent" | "cited"

  function badgesFor(p){
    const out = [];
    if(p.isMostRecent) out.push({cls:"badge-recent", text:"Most recent"});
    if(p.isMostCited)  out.push({cls:"badge-cited",  text:"Most cited"});
    if(p.isPreprint)   out.push({cls:"badge-preprint", text:"Preprint"});
    if(p.isOpenAccess) out.push({cls:"badge-oa", text:"Open access"});
    return out;
  }

  function badgeHtml(p){
    const bs = badgesFor(p);
    if(!bs.length) return "";
    return '<div class="badges">' + bs.map(b =>
      `<span class="badge ${b.cls}">${esc(b.text)}</span>`).join("") + "</div>";
  }

  function sortedPapers(){
    const copy = PROF.papers.slice();
    if(sortMode === "cited"){
      copy.sort((a,b) => (b.citedByCount||0) - (a.citedByCount||0));
    } else {
      copy.sort((a,b) => (b.year||0) - (a.year||0));
    }
    return copy;
  }

  // ---- render header ----
  function renderHeader(){
    $("profName").textContent = PROF.name;
    $("profInst").textContent = PROF.institution;
    $("profAreas").innerHTML = PROF.areas
      .map(a => `<span>${esc(a)}</span>`)
      .join('<span class="dot">·</span>');
    $("pubsCount").textContent = ` (${PROF.papers.length})`;
    $("pubsFoot").innerHTML =
      `View all ${fmt(PROF.worksCount)} papers on ` +
      `<a href="${esc(PROF.links.scholar)}" target="_blank" rel="noopener">Google Scholar</a>` +
      `<span class="dot">·</span>` +
      `<a href="${esc(PROF.links.openalex)}" target="_blank" rel="noopener">OpenAlex</a>`;
  }

  // ---- render list ----
  function renderList(){
    const list = $("pubList");
    const papers = sortedPapers();
    list.innerHTML = papers.map((p, i) => {
      const cites = (p.citedByCount != null)
        ? `<div class="pub-cites"><span class="num">${fmt(p.citedByCount)}</span><span class="lbl">citations</span></div>`
        : `<div class="pub-cites"><span class="num">—</span><span class="lbl">citations</span></div>`;
      const meta = `${esc(p.venue)}<span class="dot">·</span>${esc(p.year)}`;
      return `<li class="pub-row" tabindex="0" role="button" data-idx="${i}" aria-label="Open reference helper for ${esc(p.title)}">
        <div class="pub-main">
          <div class="pub-title">${esc(p.title)}</div>
          <div class="pub-meta">${meta}</div>
          ${badgeHtml(p)}
        </div>
        ${cites}
      </li>`;
    }).join("");

    // wire row interactions (store the sorted-order paper on each node)
    Array.from(list.querySelectorAll(".pub-row")).forEach((row, i) => {
      const paper = papers[i];
      row.addEventListener("click", () => openModal(paper));
      row.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          openModal(paper);
        }
      });
    });
  }

  function setSort(mode){
    sortMode = mode;
    const r = $("sortRecent"), c = $("sortCited");
    const recentActive = mode === "recent";
    r.classList.toggle("active", recentActive);
    c.classList.toggle("active", !recentActive);
    r.setAttribute("aria-pressed", String(recentActive));
    c.setAttribute("aria-pressed", String(!recentActive));
    renderList();
  }

  // ---- modal ----
  let lastFocused = null;

  function citationString(p){
    let s = `${PROF.name}. "${p.title}." ${p.venue}, ${p.year}.`;
    if(p.doi) s += ` https://doi.org/${p.doi}`;
    return s;
  }

  function openModal(p){
    lastFocused = document.activeElement;

    $("mTitle").textContent = p.title;
    $("mMeta").innerHTML =
      `${esc(p.venue)}<span class="dot">·</span>${esc(p.year)}<span class="dot">·</span>${esc(p.type)}`;
    $("mCites").innerHTML = (p.citedByCount != null)
      ? `<b>${fmt(p.citedByCount)}</b> citations`
      : "Citation count unavailable";

    $("mBadges").innerHTML = badgesFor(p)
      .map(b => `<span class="badge ${b.cls}">${esc(b.text)}</span>`).join("");

    // action links
    const links = [];
    if(p.oaPdfUrl){
      links.push(`<a class="m-link" href="${esc(p.oaPdfUrl)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        Read PDF</a>`);
    }
    if(p.doi){
      links.push(`<a class="m-link" href="https://doi.org/${esc(p.doi)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        DOI</a>`);
    }
    const scholarUrl = "https://scholar.google.com/scholar?q=" + encodeURIComponent(p.title);
    links.push(`<a class="m-link" href="${scholarUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      Google Scholar</a>`);
    links.push(`<a class="m-link" href="${esc(PROF.links.openalex)}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      OpenAlex</a>`);
    $("mActions").innerHTML = links.join("");

    // copy citation
    const cite = citationString(p);
    $("mCitePreview").textContent = cite;
    const copyBtn = $("mCopy");
    const copyLabel = $("mCopyLabel");
    copyBtn.classList.remove("copied");
    copyLabel.textContent = "Copy citation";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(cite);
      } catch(e){
        // fallback
        const ta = document.createElement("textarea");
        ta.value = cite;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch(_){}
        document.body.removeChild(ta);
      }
      copyBtn.classList.add("copied");
      copyLabel.textContent = "Copied!";
      clearTimeout(copyBtn._t);
      copyBtn._t = setTimeout(() => {
        copyBtn.classList.remove("copied");
        copyLabel.textContent = "Copy citation";
      }, 1800);
    };

    const bd = $("backdrop");
    bd.hidden = false;
    requestAnimationFrame(() => bd.classList.add("open"));
    $("modalClose").focus();
  }

  function closeModal(){
    const bd = $("backdrop");
    bd.classList.remove("open");
    setTimeout(() => { bd.hidden = true; }, 200);
    if(lastFocused && typeof lastFocused.focus === "function") lastFocused.focus();
  }

  // ---- init ----
  function init(){
    renderHeader();
    renderList();

    $("sortRecent").addEventListener("click", () => setSort("recent"));
    $("sortCited").addEventListener("click", () => setSort("cited"));

    $("modalClose").addEventListener("click", closeModal);
    $("backdrop").addEventListener("click", (e) => {
      if(e.target === $("backdrop")) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && !$("backdrop").hidden) closeModal();
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
</script>
</body>
</html>
